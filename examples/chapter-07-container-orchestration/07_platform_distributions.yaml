# Talos machine configuration — declarative, API-driven OS configuration
version: v1alpha1
machine:
  type: worker
  token: <token>
  ca:
    crt: <certificate>
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"
  network:
    hostname: worker-01
    interfaces:
      - interface: eth0
        dhcp: true
  install:
    disk: /dev/sda
    image: ghcr.io/siderolabs/installer:v1.7.0
    bootloader: true
    wipe: false
  sysctls:
    net.ipv6.conf.all.forwarding: "1"
cluster:
  controlPlane:
    endpoint: https://my-cluster-endpoint:6443
  clusterName: production
  network:
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
