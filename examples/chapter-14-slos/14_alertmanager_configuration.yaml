# alertmanager.yaml
global:
  # Default SMTP configuration for email notifications
  smtp_smarthost: 'smtp.acme.io:587'
  smtp_from: 'alertmanager@acme.io'
  smtp_auth_username: 'alertmanager'
  smtp_auth_password_file: /etc/alertmanager/smtp-password

  # Default PagerDuty integration key (overridden per route)
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

  # Resolve timeout: how long to wait before sending a "resolved" notification
  resolve_timeout: 5m

# Route tree: defines how alerts are routed to receivers
route:
  receiver: 'platform-default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s          # Wait before sending first notification for a new group
  group_interval: 5m       # Wait before sending a notification about new alerts in a group
  repeat_interval: 4h      # Wait before resending notification if alert is still firing

  routes:
    # Critical severity: page immediately via PagerDuty
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 0s          # No wait for critical alerts
      repeat_interval: 1h

    # Payments team alerts: route to payments on-call
    - match:
        routing_key: payments-oncall
        severity: critical
      receiver: 'payments-pagerduty'
      continue: false

    # Platform team alerts
    - match:
        team: platform
        severity: critical
      receiver: 'platform-pagerduty'

    # Warning severity: notify Slack, no page
    - match:
        severity: warning
      receiver: 'slack-warnings'
      group_interval: 10m
      repeat_interval: 24h

    # Inhibition: suppress warning alerts when critical is firing
    # (prevents alert storm during major incidents)

inhibit_rules:
  # Suppress warnings when a critical alert is firing for the same service
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service', 'cluster']

  # Suppress all alerts for a node when NodeNotReady is firing
  - source_match:
      alertname: KubernetesNodeNotReady
    target_match_re:
      alertname: '.+'
    equal: ['node']

receivers:
  - name: 'platform-default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLATFORM_WEBHOOK'
        channel: '#platform-alerts'
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        send_resolved: true

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_PLATFORM_KEY}'
        description: '{{ template "pagerduty.description" . }}'
        details:
          firing: '{{ template "pagerduty.firing" . }}'
          runbook: '{{ .CommonAnnotations.runbook }}'
          dashboard: '{{ .CommonAnnotations.dashboard }}'

  - name: 'payments-pagerduty'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_PAYMENTS_KEY}'
        description: '{{ template "pagerduty.description" . }}'
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'

  - name: 'slack-warnings'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/WARNINGS_WEBHOOK'
        channel: '#platform-warnings'
        send_resolved: true
        actions:
          - type: button
            text: 'Runbook'
            url: '{{ .CommonAnnotations.runbook }}'
          - type: button
            text: 'Dashboard'
            url: '{{ .CommonAnnotations.dashboard }}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'
