# GitHub Actions calling the Dagger pipeline
name: Build and Deploy
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v6
        with:
          version: latest
          call: publish --registry=${{ env.REGISTRY }} --tag=${{ github.sha }}
        env:
          REGISTRY: 123456789.dkr.ecr.eu-west-1.amazonaws.com
