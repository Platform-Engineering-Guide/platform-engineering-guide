# cloudbuild.yaml — CI pipeline for a Go service
steps:
  # Run tests
  - name: golang:1.23
    entrypoint: go
    args: ["test", "-v", "-race", "./..."]
    env:
      - "GOPATH=/workspace/go"

  # Run security scanning
  - name: aquasec/trivy:latest
    args:
      - "fs"
      - "--exit-code"
      - "1"
      - "--severity"
      - "HIGH,CRITICAL"
      - "."

  # Build and push container image
  - name: gcr.io/cloud-builders/docker
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/platform-images/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/platform-images/${_SERVICE_NAME}:latest"
      - "."

  - name: gcr.io/cloud-builders/docker
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/platform-images/${_SERVICE_NAME}"

  # Sign image provenance for Binary Authorization
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - "artifacts"
      - "docker"
      - "images"
      - "sign-attestation"
      - "--attestor=projects/${PROJECT_ID}/attestors/platform-ci-attestor"
      - "--signature-algorithm=EC_SIGN_P256_SHA256"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/platform-images/${_SERVICE_NAME}@${_IMAGE_DIGEST}"

  # Update image tag in GitOps repository to trigger Argo CD deployment
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        git clone https://$$GITHUB_TOKEN@github.com/acme-corp/gitops-config.git
        cd gitops-config
        sed -i "s|image: .*/${_SERVICE_NAME}:.*|image: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/platform-images/${_SERVICE_NAME}:${SHORT_SHA}|" \
          services/${_SERVICE_NAME}/overlays/staging/kustomization.yaml
        git config user.email "cloud-build@acme-corp.com"
        git config user.name "Cloud Build"
        git commit -am "ci: update ${_SERVICE_NAME} to ${SHORT_SHA} [skip ci]"
        git push
    secretEnv: ["GITHUB_TOKEN"]

substitutions:
  _SERVICE_NAME: ""
  _REGION: europe-west1

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

serviceAccount: projects/${PROJECT_ID}/serviceAccounts/cloud-build@${PROJECT_ID}.iam.gserviceaccount.com
