apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: payments-service
  namespace: payments
spec:
  replicas: 10
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
    spec:
      containers:
        - name: payments-service
          image: 123456789.dkr.ecr.eu-west-1.amazonaws.com/payments-service:v2.3.1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  strategy:
    canary:
      canaryService: payments-service-canary   # Separate service for canary traffic
      stableService: payments-service-stable   # Stable service for main traffic
      trafficRouting:
        nginx:
          stableIngress: payments-service-ingress
      steps:
        # Step 1: Route 5% to canary, run analysis for 10 minutes
        - setWeight: 5
        - pause: {duration: 2m}
        - analysis:
            templates:
              - templateName: success-rate-check
            args:
              - name: service-name
                value: payments-service-canary

        # Step 2: Increase to 20%, pause for manual approval
        - setWeight: 20
        - pause: {}    # Indefinite pause — requires manual promotion

        # Step 3: 50%, run extended analysis
        - setWeight: 50
        - pause: {duration: 5m}
        - analysis:
            templates:
              - templateName: success-rate-check
              - templateName: latency-check

        # Step 4: 100% — complete rollout
        - setWeight: 100
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-check
  namespace: payments
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result[0] >= 0.99    # 99% success rate required
      failureLimit: 2                         # Allow 2 failures before aborting
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
              service="{{args.service-name}}",
              status!~"5.."
            }[2m])) /
            sum(rate(http_requests_total{
              service="{{args.service-name}}"
            }[2m]))
    - name: error-rate
      interval: 1m
      successCondition: result[0] <= 0.01   # Less than 1% error rate
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{
              service="{{args.service-name}}",
              status=~"5.."
            }[2m])) /
            sum(rate(http_requests_total{
              service="{{args.service-name}}"
            }[2m]))
