spec:
  initContainers:
    - name: fetch-secrets
      image: ghcr.io/acme-corp/secret-fetcher:1.0.0
      command:
        - sh
        - -c
        - |
          # Authenticate using workload identity
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

          # Fetch secrets from AWS Secrets Manager
          aws secretsmanager get-secret-value \
            --secret-id /production/payments-service/database \
            --query SecretString \
            --output text > /secrets/db-credentials.json

          # Parse and write as environment file
          jq -r '"DATABASE_URL=postgresql://\(.host):5432/payments",
                  "DATABASE_USER=\(.username)",
                  "DATABASE_PASSWORD=\(.password)"' \
            /secrets/db-credentials.json > /secrets/db.env
      env:
        - name: AWS_REGION
          value: eu-west-1
      volumeMounts:
        - name: secrets-volume
          mountPath: /secrets
  containers:
    - name: payments-service
      envFrom:
        - secretRef:
            name: payments-service-static-config
      volumeMounts:
        - name: secrets-volume
          mountPath: /secrets
          readOnly: true
  volumes:
    - name: secrets-volume
      emptyDir:
        medium: Memory    # In-memory — never written to node disk
