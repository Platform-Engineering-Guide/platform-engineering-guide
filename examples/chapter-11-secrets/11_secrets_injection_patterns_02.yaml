# SecretProviderClass — defines what to mount and from where
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: payments-service-secrets
  namespace: payments
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "/production/payments-service/database"
        objectType: "secretsmanager"
        jmesPath:
          - path: "password"
            objectAlias: "db-password"
          - path: "username"
            objectAlias: "db-username"
  secretObjects:
    # Optionally also create a Kubernetes Secret (for env var injection)
    - secretName: payments-db-env
      type: Opaque
      data:
        - objectName: db-password
          key: DATABASE_PASSWORD
        - objectName: db-username
          key: DATABASE_USERNAME
---
# Pod spec using the CSI driver
spec:
  volumes:
    - name: secrets-store
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: payments-service-secrets
  containers:
    - name: payments-service
      volumeMounts:
        - name: secrets-store
          mountPath: /mnt/secrets
          readOnly: true
