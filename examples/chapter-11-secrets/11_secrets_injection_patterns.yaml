# ClusterSecretStore — platform-managed, available to all namespaces
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ExternalSecret — created per service, syncs specific secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payments-service-secrets
  namespace: payments
spec:
  refreshInterval: 1h       # Re-sync every hour
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payments-service-env    # Name of the resulting Kubernetes Secret
    creationPolicy: Owner         # ESO owns and manages the secret lifecycle
    deletionPolicy: Retain        # Keep secret if ExternalSecret is deleted
    template:
      type: Opaque
      data:
        # Transform the AWS secret into application-specific environment variable names
        DATABASE_URL: "{{ .db_host | printf \"postgresql://%s:5432/payments\" }}"
        DATABASE_USER: "{{ .db_username }}"
        DATABASE_PASSWORD: "{{ .db_password }}"
        STRIPE_API_KEY: "{{ .stripe_api_key }}"
  data:
    - secretKey: db_host
      remoteRef:
        key: /production/payments-service/database
        property: host
    - secretKey: db_username
      remoteRef:
        key: /production/payments-service/database
        property: username
    - secretKey: db_password
      remoteRef:
        key: /production/payments-service/database
        property: password
    - secretKey: stripe_api_key
      remoteRef:
        key: /production/payments-service/stripe
        property: api_key
