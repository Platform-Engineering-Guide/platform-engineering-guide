# DopplerSecret — syncs secrets from Doppler to a Kubernetes Secret
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: payments-service-secrets
  namespace: payments
spec:
  tokenSecret:
    name: doppler-token-secret    # Kubernetes Secret containing the Doppler service token
  managedSecret:
    name: payments-service-env
    type: Opaque
  resyncSeconds: 60               # Re-sync every 60 seconds
