apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-service
  namespace: payments
  annotations:
    # AWS: IRSA annotation linking to IAM role
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/payments-service-role
    # GCP: Workload Identity annotation
    iam.gke.io/gcp-service-account: payments-service@acme-prod.iam.gserviceaccount.com
automountServiceAccountToken: false   # Disable auto-mount; mount explicitly where needed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: payments
spec:
  template:
    spec:
      serviceAccountName: payments-service
      volumes:
        - name: aws-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600   # 1 hour expiration
                  audience: sts.amazonaws.com
      containers:
        - name: payments-service
          volumeMounts:
            - name: aws-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true
