# Pod annotations that trigger Vault Agent injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "payments-service"
        vault.hashicorp.com/agent-inject-secret-db-config: "database/creds/payments-service"
        vault.hashicorp.com/agent-inject-template-db-config: |
          {{- with secret "database/creds/payments-service" -}}
          spring.datasource.username={{ .Data.data.username }}
          spring.datasource.password={{ .Data.data.password }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-stripe: "secret/data/payments/stripe"
        vault.hashicorp.com/agent-pre-populate-only: "false"  # Keep agent running for rotation
        vault.hashicorp.com/agent-revoke-on-shutdown: "true"  # Revoke lease on pod termination
