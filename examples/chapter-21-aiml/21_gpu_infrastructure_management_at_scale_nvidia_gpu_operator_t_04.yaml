# Prometheus recording rules for GPU fleet health
# Save as gpu-recording-rules.yaml and load into Prometheus/Mimir

groups:
  - name: gpu_fleet
    rules:
      - record: gpu:utilization:avg5m
        expr: avg_over_time(DCGM_FI_DEV_GPU_UTIL[5m])

      - record: gpu:memory_used_fraction
        expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)

      - alert: GPUHighTemperature
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature above 85°C on {{ $labels.instance }}"

      - alert: GPUMemoryNearCapacity
        expr: gpu:memory_used_fraction > 0.95
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory above 95% on {{ $labels.gpu_uuid }}"

      - alert: GPUXIDError
        expr: increase(DCGM_FI_DEV_XID_ERRORS[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: "GPU XID error detected — potential hardware failure"
