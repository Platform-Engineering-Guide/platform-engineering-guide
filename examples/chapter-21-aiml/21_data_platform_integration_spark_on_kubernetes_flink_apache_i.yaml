# SparkApplication CRD for a Spark ETL job
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: feature-engineering-job
  namespace: data-platform
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: your-registry/spark-ml:3.5.0
  imagePullPolicy: Always
  mainApplicationFile: s3a://your-bucket/jobs/feature_engineering.py
  sparkVersion: "3.5.0"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
  driver:
    cores: 2
    memory: "8g"
    serviceAccount: spark-driver
  executor:
    cores: 4
    instances: 10
    memory: "16g"
  hadoopConf:
    "fs.s3a.aws.credentials.provider": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider"
