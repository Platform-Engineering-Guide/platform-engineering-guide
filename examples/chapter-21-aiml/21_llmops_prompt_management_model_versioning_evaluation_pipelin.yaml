# Langfuse deployment on Kubernetes (simplified)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: llm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: langfuse
  template:
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2.x
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-db
                  key: url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: nextauth-secret
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: salt
          ports:
            - containerPort: 3000
