# CompositeResourceDefinition — defines the API surface
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: compositedatabases.platform.acme.io
spec:
  group: platform.acme.io
  names:
    kind: CompositeDatabase
    plural: compositedatabases
  claimNames:
    kind: Database
    plural: databases
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    tier:
                      type: string
                      enum: [small, medium, large]
                      description: Database size tier
                    engine:
                      type: string
                      enum: [postgres, mysql]
                      default: postgres
                    environment:
                      type: string
                      enum: [dev, staging, production]
                  required: [tier, environment]
